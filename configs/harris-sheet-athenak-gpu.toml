[paths]
athena_source = "unused"
build_dir = "build/unused"
athenak_source = "/home/user0001/apps/athenak-main"
athenak_build_dir = "build/athenak-cuda-harris-sheet"
output_root = "/home/user0001/MHDFlows_replicate/outputs/hs_sim"

[execution]
solver = "athenak"
backend = "linux"
dependency_prefix = "/usr/local/cuda-12.8"
threads = 16
mpi_ranks = 1
mpi_compiler = "mpicxx"
mpi_launcher = "mpirun"
julia_command = "julia"
python_command = "/home/user0001/.conda/envs/athena-build/bin/python"
simulation_timeout = 6600

[build]
eos = "isothermal"
openmp = false
mpi = false
single_precision = true

[athenak]
revision = ""
device = "cuda"
kokkos_arch = "BLACKWELL120"
integrator = "rk2"
reconstruction = "plm"

[simulation]
run_name = "harris_sheet_cuda_n256"
resolution = 256
meshblock = 32
box_length = 1.0
tlim = 0.5
nlim = 5000
cfl = 0.30
rho0 = 1.0
sound_speed = 1.0
pressure0 = 1.0

[harris_sheet]
b0 = 1.0
guide_b3 = 0.1
sheet_width = 0.05
noise_amplitude = 0.001

[particles]
enabled = false
nparticles = 1024
injection_radius = 0.02
velocity_scale = 0.0
track_interval = 0.02
vtk_interval = 0.10

[output]
history_interval = 0.02
snapshot_interval = 0.10
restart_interval = 1.0
slice_axis = "x3"
slice_index = -1
quiver_stride = 8
snapshot_policy = "peak_current"
