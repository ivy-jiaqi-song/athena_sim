# Example 256^3 driven MHD turbulence configuration with M_s > 1.
# Copy this file to local.toml and update all machine-specific paths and resources.
# The dependency environment must provide OpenMPI and MPI-enabled FFTW/HDF5.
# 256^3 with meshblock=32 -> 512 MeshBlocks; 16 ranks -> 32 blocks/rank.
#
# sound_speed=0.75 targets M_s around 1.3 while guide_field=1.07 gives M_A around 0.9.

[paths]
athena_source = "/home/user0001/apps/athena-main"
build_dir = "build/athena"
# External recursive AthenaK checkout pinned to [athenak].revision. The pipeline
# copies it before installing the custom problem generator; this checkout is not modified.
athenak_source = "/home/user0001/apps/athenak"
athenak_build_dir = "build/athenak"
output_root = "outputs"

[execution]
solver = "athena++"
backend = "linux"
dependency_prefix = "/home/user0001/.conda/envs/athena-build"
threads = 1
mpi_ranks = 16
mpi_compiler = "mpicxx"
mpi_launcher = "mpirun"
julia_command = "julia"
python_command = "python3"

[build]
eos = "isothermal"
openmp = false
mpi = true
single_precision = false

[athenak]
revision = "5f1993109bcb2e5d588ba41b4efc897408e9959a"
device = "cpu"
# Required for device="cuda" (examples: AMPERE80, ADA89, HOPPER90). This is
# machine-local and must match the installed NVIDIA GPU and Kokkos support.
kokkos_arch = ""
integrator = "rk2"
reconstruction = "plm"
# Athena++'s exclusive forcing bounds below are translated to AthenaK's
# inclusive bounds (nlow+1, nhigh-1).

[simulation]
run_name = "mhd_256_ms_gt1"
resolution = 256
meshblock = 32
box_length = 1.0
tlim = 2.0
cfl = 0.30
integrator = "vl2"
reconstruction_order = 2
rho0 = 1.0
# Lowered from 1.0 to 0.75 to push M_s above 1 (target ~1.3 at 256^3).
sound_speed = 0.75
pressure0 = 0.6
# Iteration 2 of the mhd_256_ma09 lineage kept B0=1.07 (M_A ~0.93); unchanged here.
guide_field = [1.07, 0.0, 0.0]

[selection]
# Choose exactly one matching mode: "ms" uses sonic_mach; "ma" uses delta-B_rms/|<B>|.
metric = "ms"
target = 1.3

[forcing]
mode = 2
energy_injection_rate = 1.0
# Athena++ drives modes with nlow < |k| < nhigh; shells 2-3 give L_inj ~ 0.4 Lbox.
nlow = 1
nhigh = 4
spectrum_exponent = 2.0
correlation_time = 0.10
drive_interval = 0.02
solenoidal_fraction = 1.0
random_seed = 12345

[output]
history_interval = 0.05
snapshot_interval = 0.25
restart_interval = 1.0
slice_axis = "x3"
slice_index = -1
quiver_stride = 8

[power_spectra]
enabled = true
plot_k_min = 1
# 0 means floor(min(Nx, Ny, Nz) / 3); for 512^3 this is 170.
plot_k_max = 0
fit_enabled = true
fit_k_min = 0
fit_k_max = 0
fit_magnetic_only = true
min_fit_bins = 8
parseval_rtol = 1.0e-5
guide_alignment_tolerance = 1.0e-8
save_full_nyquist_spectrum = true
